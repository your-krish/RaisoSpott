<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#7C3AED" />
  <title>RaisoSpot – Profile</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="light" data-page="profile">

  <!-- LOGIN MODAL (in case guest navigates directly) -->
  <div id="login-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <button class="modal-close">✕</button>
      <div class="modal-emoji">👀✨</div>
      <h3>Login to view your profile</h3>
      <button id="modal-google-btn" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>
    </div>
  </div>

  <!-- EDIT CAPTION MODAL -->
  <div id="edit-caption-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box tall-modal">
      <button class="modal-close">✕</button>
      <h3>Edit Caption</h3>
      <textarea id="edit-caption-text" rows="4" placeholder="Edit your caption..."></textarea>
      <button id="save-caption-btn" class="btn-primary">Save Changes</button>
    </div>
  </div>

  <!-- COMMENT MODAL -->
  <div id="comment-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box tall-modal">
      <button class="modal-close">✕</button>
      <h3>Comments</h3>
      <div id="comments-list" class="comments-list"></div>
      <div class="comment-input-row">
        <input type="text" id="comment-input" placeholder="Write a comment..." />
        <button id="submit-comment" class="btn-icon">↑</button>
      </div>
    </div>
  </div>

  <!-- REPORT MODAL -->
  <div id="report-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box tall-modal">
      <button class="modal-close">✕</button>
      <h3>🚩 Report Post</h3>
      <p style="color:var(--text2);font-size:14px;margin-bottom:12px">Why are you reporting this post?</p>
      <div class="report-cats">
        <button class="report-cat-btn" data-cat="spam">📢 Spam or misleading</button>
        <button class="report-cat-btn" data-cat="harassment">😡 Harassment or hate</button>
        <button class="report-cat-btn" data-cat="inappropriate">🔞 Inappropriate or sexual content</button>
        <button class="report-cat-btn" data-cat="violence">⚠️ Violence or dangerous activity</button>
        <button class="report-cat-btn" data-cat="misinformation">❌ False information</button>
        <button class="report-cat-btn" data-cat="other">💬 Other</button>
      </div>
      <textarea id="report-other-input" class="hidden" placeholder="Tell us more (optional)..." rows="3" style="margin-top:10px"></textarea>
      <button id="submit-report-btn" class="btn-primary" style="margin-top:14px">Submit Report</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <header class="app-header">
    <div class="logo-wrap">
      <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none">
        <img src="RaisoSpot.png" alt="RaisoSpot" class="logo-img" />
        <span class="logo-text">RaisoSpot</span>
      </a>
    </div>
    <div class="header-right">
      <div id="user-avatar-wrap" class="hidden">
        <img id="user-avatar" class="avatar" alt="Profile" />
      </div>
      <button id="header-login-btn" class="btn-login-small"><i class="fa-solid fa-user-clock" style="color: rgb(255, 255, 255);"></i>&nbsp;Login</button>
    </div>
  </header>

  <main id="main-content" class="profile-page">
    <!-- Guest guard -->
    <div id="profile-guest-guard" class="empty-state hidden">
      <div class="empty-icon">🔒</div>
      <h3>Login to view your profile</h3>
      <button id="profile-login-btn" class="btn-primary" style="margin-top:16px">Login with Google</button>
    </div>

    <!-- Profile content (shown when logged in) -->
    <div id="profile-content" class="hidden">
      <div class="profile-header">
        <div class="profile-avatar-wrap">
          <img id="profile-avatar-img" src="" alt="Profile" />
          <button class="profile-avatar-edit" id="profile-avatar-edit-btn" title="Edit photo">✏️</button>
          <input type="file" id="profile-avatar-input" accept="image/*" style="display:none" />
        </div>
        <div id="profile-username-display" class="profile-username"></div>
        <div id="profile-email-display" class="profile-email-small"></div>
        <div class="profile-edit-row">
          <input type="text" id="profile-name-input" placeholder="Edit username..." />
          <button class="btn-save-name" id="save-profile-name">Save</button>
        </div>
      </div>
      <div class="profile-stats">
        <div class="profile-stat">
          <div class="profile-stat-num" id="profile-post-count">0</div>
          <div class="profile-stat-label">Posts</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-num" id="profile-like-count">0</div>
          <div class="profile-stat-label">Likes</div>
        </div>
      </div>
      <div id="profile-grid" class="profile-grid"></div>
      <div id="profile-empty" class="empty-state hidden">
        <div class="empty-icon">📷</div>
        <h3>No posts yet</h3>
        <p>Your posts will appear here</p>
      </div>
    </div>
  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-link active" data-page="feed">
      <span class="nav-icon"><i class="fa-solid fa-house" style="color: rgb(146, 0, 192);"></i></span>
      <span class="nav-label">Feed</span>
    </a>
    <a href="academics.html" class="nav-link" data-page="academics">
      <span class="nav-icon"><i class="fa-solid fa-book" style="color: rgb(146, 0, 192);"></i></span>
      <span class="nav-label">Academics</span>
    </a>
    <button id="create-btn" class="nav-btn create-btn">
      <span class="nav-icon create-icon"><i class="fa-solid fa-plus" style="color: rgb(255, 255, 255);"></i></span>
    </button>
    <a href="opportunities.html" class="nav-link" data-page="opportunities">
      <span class="nav-icon"><i class="fa-solid fa-graduation-cap" style="color: rgb(146, 0, 192);"></i></span>
      <span class="nav-label">Opportunities</span>
    </a>
    <a href="more.html" class="nav-link" data-page="more">
      <span class="nav-icon"><i class="fa-solid fa-grip" style="color: rgb(146, 0, 192);"></i></span>
      <span class="nav-label">More</span>
    </a>
  </nav>

  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/feed.js"></script>
  <script src="js/common.js"></script>
  <script>
    window.pageInit = function() {
      if (!currentUser) {
        document.getElementById('profile-guest-guard')?.classList.remove('hidden');
        document.getElementById('profile-content')?.classList.add('hidden');
        document.getElementById('profile-login-btn')?.addEventListener('click', signInWithGoogle);
        return;
      }

      document.getElementById('profile-guest-guard')?.classList.add('hidden');
      document.getElementById('profile-content')?.classList.remove('hidden');

      updateProfilePage();
      loadProfilePosts();

      // Avatar upload
      document.getElementById('profile-avatar-edit-btn')?.addEventListener('click', () => {
        document.getElementById('profile-avatar-input')?.click();
      });
      document.getElementById('profile-avatar-input')?.addEventListener('change', async (e) => {
        const file = e.target.files?.[0];
        if (file) await handleAvatarUpload(file);
        e.target.value = '';
      });

      // Save name
      document.getElementById('save-profile-name')?.addEventListener('click', saveProfileName);

      // Post modals
      document.getElementById('save-caption-btn')?.addEventListener('click', saveEditedCaption);
      document.getElementById('submit-comment')?.addEventListener('click', () => requireAuth(submitComment));
      document.getElementById('comment-input')?.addEventListener('keydown', e => {
        if (e.key === 'Enter') requireAuth(submitComment);
      });

      // Report modal
      document.querySelectorAll('.report-cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.report-cat-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          const otherInput = document.getElementById('report-other-input');
          if (otherInput) otherInput.classList.toggle('hidden', btn.dataset.cat !== 'other');
        });
      });
      document.getElementById('submit-report-btn')?.addEventListener('click', submitReport);

      // Image protection
      document.addEventListener('contextmenu', (e) => {
        if (e.target.closest('.card-images, .profile-grid-item')) e.preventDefault();
      });
    };
  </script>
</body>
</html>
